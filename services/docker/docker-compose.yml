services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-16.0
    environment:
      POSTGRES_DB: atlas_dev
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres-16.0_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: mysql-8.4
    environment:
      MYSQL_ROOT_PASSWORD: atlas
      MYSQL_DATABASE: atlas_dev
      MYSQL_USER: atlas
      MYSQL_PASSWORD: atlas
    ports:
      - "3306:3306"
    volumes:
      - mysql-8.4_data:/var/lib/mysql

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-21-slim
    environment:
      ORACLE_PASSWORD: atlas
      APP_USER: atlas
      APP_USER_PASSWORD: atlas
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-21-slim_data:/opt/oracle/oradata

  redis:
    image: redis:7-alpine
    container_name: redis-7.0
    ports:
      - "6379:6379"
    volumes:
      - redis-7.0_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-3-management
    environment:
      RABBITMQ_DEFAULT_USER: atlas
      RABBITMQ_DEFAULT_PASS: atlas
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-3-management_data:/var/lib/rabbitmq

  kafka:
    image: bitnamilegacy/kafka:3.8.0-debian-12-r1
    container_name: kafka-3.8
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-3.8_data:/bitnami/kafka

  akhq:
    image: tchiotludo/akhq:0.24.0
    container_name: akhq-0.24.0
    depends_on:
      - kafka
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:29092"
    ports:
      - "8080:8080"

  kafka-connect:
    image: bitnami/kafka-connect:3.8
    container_name: kafka-connect-3.8
    depends_on:
      - kafka
    environment:
      KAFKA_CFG_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CFG_GROUP_ID: atlas-connect-group
      KAFKA_CFG_CONFIG_STORAGE_TOPIC: atlas-connect-configs
      KAFKA_CFG_OFFSET_STORAGE_TOPIC: atlas-connect-offsets
      KAFKA_CFG_STATUS_STORAGE_TOPIC: atlas-connect-status
      KAFKA_CFG_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      KAFKA_CFG_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "8083:8083"
    volumes:
      - kafka-connect-3.8_data:/bitnami/kafka

volumes:
  postgres-16.0_data:
  mysql-8.4_data:
  oracle-21-slim_data:
  redis-7.0_data:
  rabbitmq-3-management_data:
  kafka-3.8_data:
  kafka-connect-3.8_data:
